# docker-compose.yml
services:
  # --- PostgreSQL Database Service ---
  postgres-db:
    image: postgres:15
    container_name: dq_postgres_db
    environment:
      POSTGRES_DB: dq_db
      POSTGRES_USER: dq_user
      POSTGRES_PASSWORD: dq_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U dq_user -d dq_db"]
        interval: 10s
        timeout: 5s
        retries: 5

  # --- Spark Application Service ---
  spark-dq-app:
    build: .
    container_name: spark-dq-pipeline-container
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DB_CONNECTION_STRING: "postgresql://dq_user:dq_password@postgres-db:5432/dq_db"
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./config:/app/config
      - ./src:/app/src

volumes:
  postgres_data:
    driver: local
